# Rich Posts — nginx site config
# Замените rich.helito.ge и /opt/SuperAPP/RichPosts на ваш домен и путь установки

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rich.helito.ge;

    ssl_certificate /etc/letsencrypt/live/rich.helito.ge/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rich.helito.ge/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 64k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    limit_conn rich_posts_conn 20;

    access_log /var/log/nginx/rich_posts_access.log;
    error_log /var/log/nginx/rich_posts_error.log;

    root /opt/SuperAPP/RichPosts/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    include /opt/SuperAPP/RichPosts/nginx/security-headers.conf;

    # Скрытые и служебные файлы
    location ~ /\. {
        deny all;
        return 404;
    }

    location ~* \.(env|git|sql|bak|ini|log|sh)$ {
        deny all;
        return 404;
    }

    # Типовые сканеры
    location ~* ^/(wp-admin|wp-login|xmlrpc\.php|phpmyadmin|\.git) {
        return 444;
    }

# nginx: webhook (Telegram → backend)
    location = /api/v1/telegram/webhook {
        client_max_body_size 64k;

        proxy_pass http://127.0.0.1:8035/api/v1/telegram/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        limit_except POST OPTIONS {
            deny all;
        }
    }

    # Загрузка медиа с телефона (до 50 МБ)
    location = /api/v1/rich-posts/upload {
        limit_req zone=rich_posts_api burst=5 nodelay;
        client_max_body_size 50m;

        proxy_pass http://127.0.0.1:8035/api/v1/rich-posts/upload;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;

        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        limit_except POST OPTIONS {
            deny all;
        }
    }

    # Публичные медиа для Rich Messages (Telegram скачивает по HTTPS)
    location /uploads/ {
        limit_req zone=rich_posts_static burst=50 nodelay;
        alias /opt/SuperAPP/RichPosts/backend/uploads/;
        include /opt/SuperAPP/RichPosts/nginx/security-headers.conf;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Content-Type $content_type always;
        types {
            image/jpeg jpg jpeg;
            image/png png;
            image/webp webp;
            image/gif gif;
            video/mp4 mp4;
            video/quicktime mov;
            audio/mpeg mp3;
            audio/ogg ogg oga;
            audio/opus opus;
            audio/webm webm;
        }
        try_files $uri =404;
    }

    # API — только через nginx, с rate limit
    location /api/ {
        limit_req zone=rich_posts_api burst=15 nodelay;

        proxy_pass http://127.0.0.1:8035/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Init-Data $http_x_telegram_init_data;

        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Не проксируем лишние методы
        limit_except GET POST OPTIONS {
            deny all;
        }
    }

    # Демо-фото для превью (локально на домене)
    location /demo/ {
        limit_req zone=rich_posts_static burst=50 nodelay;
        include /opt/SuperAPP/RichPosts/nginx/security-headers.conf;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # Статика mini app
    location /assets/ {
        limit_req zone=rich_posts_static burst=50 nodelay;
        include /opt/SuperAPP/RichPosts/nginx/security-headers.conf;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        try_files $uri =404;
    }

    location / {
        limit_req zone=rich_posts_static burst=50 nodelay;
        include /opt/SuperAPP/RichPosts/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name rich.helito.ge;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
